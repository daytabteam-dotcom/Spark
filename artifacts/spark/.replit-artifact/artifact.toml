kind = "mobile"
previewPath = "/"
title = "Spark — ADHD Companion"
version = "1.0.0"
id = "artifacts/spark"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21280

[services.development]
run = "pnpm --filter @workspace/spark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spark", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/spark", "run", "serve" ]

[services.env]
PORT = "21280"
BASE_PATH = "/"
